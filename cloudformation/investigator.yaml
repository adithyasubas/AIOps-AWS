AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Investigator Lambda + DynamoDB incident memory table. Subscribes to the
  alarms SNS topic, checks memory for known incidents, falls back to Claude
  via Bedrock when memory misses, posts a Slack RCA, and (optionally)
  auto-remediates when confidence and risk thresholds are met.

Parameters:
  EnvironmentName:
    Type: String
    Default: chaos-demo
  SNSTopicArn:
    Type: String
  ECSClusterName:
    Type: String
  ECSServiceName:
    Type: String
  PipelineName:
    Type: String
  ECSLogGroupName:
    Type: String
  BedrockModelId:
    Type: String
    Default: us.anthropic.claude-sonnet-4-6
    Description: Bedrock cross-region inference profile id. Foundation model ids reject on-demand invocation for newer Claude models.
  BedrockRegion:
    Type: String
    Default: us-east-1
    Description: Region the Bedrock runtime client targets.
  GitHubOwner:
    Type: String
    Default: adithyasubas
  GitHubRepo:
    Type: String
    Default: AIOps-AWS
  GitHubBaseBranch:
    Type: String
    Default: main
  GitHubTokenParamName:
    Type: String
    Default: /chaos-demo/investigator/github-token
    Description: SSM SecureString parameter holding a GitHub PAT with repo write access. Operator creates this manually before deploy.
  AutoRemediateEnabled:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
  AutoRemediateConfidenceThreshold:
    Type: Number
    Default: 0.85
    MinValue: 0
    MaxValue: 1
  AutoRemediateAllowedActions:
    Type: String
    Default: "rollback,create_pr"
    Description: Comma-separated list. Anything not listed cannot fire from auto-remediation.
  AutoRemediateRequireLowRisk:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: When true, auto-remediation only fires for risk_level=LOW. When false, MEDIUM is also accepted.
  IncidentMemoryEnabled:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
  IncidentMemoryTtlDays:
    Type: Number
    Default: 90
    MinValue: 1
  MemoryMinSuccessCount:
    Type: Number
    Default: 1
    MinValue: 0
    Description: Minimum success_count on a memory row before the investigator will reuse it instead of calling Bedrock.

Resources:
  IncidentMemoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${EnvironmentName}-incident-memory"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: incident_signature
          AttributeType: S
      KeySchema:
        - AttributeName: incident_signature
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      Tags:
        - Key: Project
          Value: chaos-cicd-demo
        - Key: Environment
          Value: demo
        - Key: ManagedBy
          Value: CloudFormation

  InvestigatorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${EnvironmentName}-investigator"
      RetentionInDays: 7

  InvestigatorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: investigator
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt InvestigatorLogGroup.Arn
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/chaos-demo/investigator/slack-webhook-url"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GitHubTokenParamName}"
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:Converse
                  - bedrock:ConverseStream
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.*"
                  - "arn:aws:bedrock:*::foundation-model/anthropic.*"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*"
                  - "arn:aws:bedrock:*:*:inference-profile/*"
              - Effect: Allow
                Action:
                  - aws-marketplace:Subscribe
                  - aws-marketplace:ViewSubscriptions
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:FilterLogEvents
                  - logs:GetLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:${ECSLogGroupName}*"
              - Effect: Allow
                Action:
                  - codepipeline:ListPipelineExecutions
                  - codepipeline:GetPipelineState
                  - codepipeline:GetPipeline
                  - codepipeline:GetPipelineExecution
                  - codepipeline:StartPipelineExecution
                Resource: !Sub "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${PipelineName}"
              - Effect: Allow
                Action:
                  - codepipeline:RollbackStage
                Resource:
                  - !Sub "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${PipelineName}"
                  - !Sub "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${PipelineName}/*"
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt IncidentMemoryTable.Arn

  InvestigatorFunction:
    Type: AWS::Lambda::Function
    DependsOn: InvestigatorLogGroup
    Properties:
      FunctionName: !Sub "${EnvironmentName}-investigator"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 90
      MemorySize: 512
      Role: !GetAtt InvestigatorRole.Arn
      Code: ../lambda/investigator
      Environment:
        Variables:
          ECS_CLUSTER: !Ref ECSClusterName
          ECS_SERVICE: !Ref ECSServiceName
          PIPELINE_NAME: !Ref PipelineName
          ECS_LOG_GROUP: !Ref ECSLogGroupName
          SLACK_URL_PARAM: /chaos-demo/investigator/slack-webhook-url
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          BEDROCK_REGION: !Ref BedrockRegion
          GITHUB_OWNER: !Ref GitHubOwner
          GITHUB_REPO: !Ref GitHubRepo
          GITHUB_BASE_BRANCH: !Ref GitHubBaseBranch
          GITHUB_TOKEN_PARAM_NAME: !Ref GitHubTokenParamName
          INCIDENT_MEMORY_TABLE_NAME: !Ref IncidentMemoryTable
          INCIDENT_MEMORY_ENABLED: !Ref IncidentMemoryEnabled
          INCIDENT_MEMORY_TTL_DAYS: !Ref IncidentMemoryTtlDays
          MEMORY_MIN_SUCCESS_COUNT: !Ref MemoryMinSuccessCount
          AUTO_REMEDIATE_ENABLED: !Ref AutoRemediateEnabled
          AUTO_REMEDIATE_CONFIDENCE_THRESHOLD: !Ref AutoRemediateConfidenceThreshold
          AUTO_REMEDIATE_ALLOWED_ACTIONS: !Ref AutoRemediateAllowedActions
          AUTO_REMEDIATE_REQUIRE_LOW_RISK: !Ref AutoRemediateRequireLowRisk
      Tags:
        - Key: Project
          Value: chaos-cicd-demo
        - Key: Environment
          Value: demo
        - Key: ManagedBy
          Value: CloudFormation

  AlarmsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: lambda
      TopicArn: !Ref SNSTopicArn
      Endpoint: !GetAtt InvestigatorFunction.Arn

  AllowSnsInvoke:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref InvestigatorFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref SNSTopicArn

Outputs:
  InvestigatorFunctionArn:
    Value: !GetAtt InvestigatorFunction.Arn
  InvestigatorFunctionName:
    Value: !Ref InvestigatorFunction
  IncidentMemoryTableName:
    Value: !Ref IncidentMemoryTable
