AWSTemplateFormatVersion: "2010-09-09"
Description: >
  SSM SecureString parameters for the DevOps Agent webhook URL/secret,
  Lambda function that receives SNS alarm events and forwards a signed
  webhook payload, and the SNS subscription that wires them together.

Parameters:
  EnvironmentName:
    Type: String
    Default: chaos-demo
  SNSTopicArn:
    Type: String

Resources:
  WebhookUrlParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /chaos-demo/devops-agent/webhook-url
      Type: String
      Value: "PLACEHOLDER_SET_AFTER_DEVOPS_AGENT_SETUP"
      Description: DevOps Agent webhook URL. Overwrite via aws ssm put-parameter (SecureString) after agent setup.
      Tier: Standard
      Tags:
        Project: chaos-cicd-demo
        Environment: demo
        ManagedBy: CloudFormation

  WebhookSecretParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /chaos-demo/devops-agent/webhook-secret
      Type: String
      Value: "PLACEHOLDER_SET_AFTER_DEVOPS_AGENT_SETUP"
      Description: HMAC secret for the DevOps Agent webhook. Overwrite via aws ssm put-parameter (SecureString) after agent setup.
      Tier: Standard
      Tags:
        Project: chaos-cicd-demo
        Environment: demo
        ManagedBy: CloudFormation

  WebhookBridgeLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${EnvironmentName}-webhook-bridge"
      RetentionInDays: 7

  WebhookBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: WebhookBridgeAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/chaos-demo/devops-agent/webhook-url"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/chaos-demo/devops-agent/webhook-secret"
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt WebhookBridgeLogGroup.Arn

  WebhookBridgeFunction:
    Type: AWS::Lambda::Function
    DependsOn: WebhookBridgeLogGroup
    Properties:
      FunctionName: !Sub "${EnvironmentName}-webhook-bridge"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      MemorySize: 256
      Role: !GetAtt WebhookBridgeRole.Arn
      Code: ../lambda
      Environment:
        Variables:
          WEBHOOK_URL_PARAM: /chaos-demo/devops-agent/webhook-url
          WEBHOOK_SECRET_PARAM: /chaos-demo/devops-agent/webhook-secret
      Tags:
        - Key: Project
          Value: chaos-cicd-demo
        - Key: Environment
          Value: demo
        - Key: ManagedBy
          Value: CloudFormation

  SNSToLambdaSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: lambda
      TopicArn: !Ref SNSTopicArn
      Endpoint: !GetAtt WebhookBridgeFunction.Arn

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebhookBridgeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref SNSTopicArn

Outputs:
  WebhookBridgeFunctionArn:
    Value: !GetAtt WebhookBridgeFunction.Arn
  WebhookBridgeFunctionName:
    Value: !Ref WebhookBridgeFunction
