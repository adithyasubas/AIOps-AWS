AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Chaos CICD Demo — parent stack orchestrating VPC, ECS, Pipeline,
  Monitoring, Chaos (FIS), and Webhook bridge nested stacks.

Parameters:
  EnvironmentName:
    Type: String
    Default: chaos-demo
  GitHubOwner:
    Type: String
    Description: GitHub username or org that owns the application repo.
  GitHubRepo:
    Type: String
    Default: AIOps-AWS
  GitHubBranch:
    Type: String
    Default: main
  GitHubConnectionArn:
    Type: String
    Description: ARN of an existing CodeStar GitHub connection (must be created in console first).
  EnableNatGateway:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: If true, adds a NAT Gateway (~$35/month). Default false runs Fargate in public subnets.
  DesiredCount:
    Type: Number
    Default: 0
    MinValue: 0
    Description: ECS desired count. Default 0 for first deploy (ECR is empty); rerun deploy.sh after the pipeline pushes the first image to scale to 2.
  EnableChaos:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Whether to create FIS experiment templates. Requires a one-time AWS FIS opt-in in the account (visit the FIS console first). Default false.
  GitHubTokenParamName:
    Type: String
    Default: /chaos-demo/investigator/github-token
    Description: SSM SecureString parameter holding a GitHub PAT with repo write access. Operator creates this manually before deploy.
  AutoRemediateEnabled:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Master switch for automated rollback / PR creation. Default off; flip to true once you trust the agent's confidence calibration.
  AutoRemediateConfidenceThreshold:
    Type: Number
    Default: 0.85
    MinValue: 0
    MaxValue: 1
  AutoRemediateAllowedActions:
    Type: String
    Default: "rollback,create_pr"
  AutoRemediateRequireLowRisk:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
  IncidentMemoryEnabled:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
  IncidentMemoryTtlDays:
    Type: Number
    Default: 90
    MinValue: 1
  MemoryMinSuccessCount:
    Type: Number
    Default: 1
    MinValue: 0

Conditions:
  CreateChaos: !Equals [!Ref EnableChaos, "true"]

Resources:
  VpcStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./vpc.yaml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        EnableNatGateway: !Ref EnableNatGateway
      Tags:
        - Key: Project
          Value: chaos-cicd-demo
        - Key: Environment
          Value: demo
        - Key: ManagedBy
          Value: CloudFormation

  EcsStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./ecs.yaml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        VpcId: !GetAtt VpcStack.Outputs.VpcId
        PublicSubnetIds: !GetAtt VpcStack.Outputs.PublicSubnetIds
        DesiredCount: !Ref DesiredCount
      Tags:
        - Key: Project
          Value: chaos-cicd-demo
        - Key: Environment
          Value: demo
        - Key: ManagedBy
          Value: CloudFormation

  PipelineStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./pipeline.yaml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        ECRRepositoryUri: !GetAtt EcsStack.Outputs.ECRRepositoryUri
        ECRRepositoryName: !GetAtt EcsStack.Outputs.ECRRepositoryName
        ECSClusterName: !GetAtt EcsStack.Outputs.ECSClusterName
        ECSServiceName: !GetAtt EcsStack.Outputs.ECSServiceName
        GitHubOwner: !Ref GitHubOwner
        GitHubRepo: !Ref GitHubRepo
        GitHubBranch: !Ref GitHubBranch
        GitHubConnectionArn: !Ref GitHubConnectionArn
      Tags:
        - Key: Project
          Value: chaos-cicd-demo
        - Key: Environment
          Value: demo
        - Key: ManagedBy
          Value: CloudFormation

  MonitoringStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./monitoring.yaml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        ECSClusterName: !GetAtt EcsStack.Outputs.ECSClusterName
        ECSServiceName: !GetAtt EcsStack.Outputs.ECSServiceName
        ALBArn: !GetAtt EcsStack.Outputs.ALBArn
        TargetGroupArn: !GetAtt EcsStack.Outputs.TargetGroupArn
        ECSLogGroupName: !GetAtt EcsStack.Outputs.ECSLogGroupName
      Tags:
        - Key: Project
          Value: chaos-cicd-demo
        - Key: Environment
          Value: demo
        - Key: ManagedBy
          Value: CloudFormation

  ChaosStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateChaos
    Properties:
      TemplateURL: ./chaos.yaml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        ECSClusterArn: !GetAtt EcsStack.Outputs.ECSClusterArn
      Tags:
        - Key: Project
          Value: chaos-cicd-demo
        - Key: Environment
          Value: demo
        - Key: ManagedBy
          Value: CloudFormation

  WebhookBridgeStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./webhook-bridge.yaml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        SNSTopicArn: !GetAtt MonitoringStack.Outputs.SNSTopicArn
      Tags:
        - Key: Project
          Value: chaos-cicd-demo
        - Key: Environment
          Value: demo
        - Key: ManagedBy
          Value: CloudFormation

  InvestigatorStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./investigator.yaml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        SNSTopicArn: !GetAtt MonitoringStack.Outputs.SNSTopicArn
        ECSClusterName: !GetAtt EcsStack.Outputs.ECSClusterName
        ECSServiceName: !GetAtt EcsStack.Outputs.ECSServiceName
        PipelineName: !GetAtt PipelineStack.Outputs.PipelineName
        ECSLogGroupName: !GetAtt EcsStack.Outputs.ECSLogGroupName
        GitHubOwner: !Ref GitHubOwner
        GitHubRepo: !Ref GitHubRepo
        GitHubBaseBranch: !Ref GitHubBranch
        GitHubTokenParamName: !Ref GitHubTokenParamName
        AutoRemediateEnabled: !Ref AutoRemediateEnabled
        AutoRemediateConfidenceThreshold: !Ref AutoRemediateConfidenceThreshold
        AutoRemediateAllowedActions: !Ref AutoRemediateAllowedActions
        AutoRemediateRequireLowRisk: !Ref AutoRemediateRequireLowRisk
        IncidentMemoryEnabled: !Ref IncidentMemoryEnabled
        IncidentMemoryTtlDays: !Ref IncidentMemoryTtlDays
        MemoryMinSuccessCount: !Ref MemoryMinSuccessCount
      Tags:
        - Key: Project
          Value: chaos-cicd-demo
        - Key: Environment
          Value: demo
        - Key: ManagedBy
          Value: CloudFormation

  InvestigatorInteractionsStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./investigator-interactions.yaml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        PipelineName: !GetAtt PipelineStack.Outputs.PipelineName
        GitHubOwner: !Ref GitHubOwner
        GitHubRepo: !Ref GitHubRepo
        GitHubBaseBranch: !Ref GitHubBranch
        GitHubTokenParamName: !Ref GitHubTokenParamName
      Tags:
        - Key: Project
          Value: chaos-cicd-demo
        - Key: Environment
          Value: demo
        - Key: ManagedBy
          Value: CloudFormation

  ChaosTriggerStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./chaos-trigger.yaml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        ECSClusterName: !GetAtt EcsStack.Outputs.ECSClusterName
        ECSServiceName: !GetAtt EcsStack.Outputs.ECSServiceName
        PipelineName: !GetAtt PipelineStack.Outputs.PipelineName
        AlarmsTopicArn: !GetAtt MonitoringStack.Outputs.SNSTopicArn
        IncidentMemoryTableName: !GetAtt InvestigatorStack.Outputs.IncidentMemoryTableName
      Tags:
        - Key: Project
          Value: chaos-cicd-demo
        - Key: Environment
          Value: demo
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  ALBDnsName:
    Description: Public DNS of the ALB. Hit /, /health, /info.
    Value: !GetAtt EcsStack.Outputs.ALBDnsName
  ECRRepositoryUri:
    Value: !GetAtt EcsStack.Outputs.ECRRepositoryUri
  ECSClusterName:
    Value: !GetAtt EcsStack.Outputs.ECSClusterName
  ECSServiceName:
    Value: !GetAtt EcsStack.Outputs.ECSServiceName
  PipelineName:
    Value: !GetAtt PipelineStack.Outputs.PipelineName
  ArtifactBucketName:
    Value: !GetAtt PipelineStack.Outputs.ArtifactBucketName
  SNSTopicArn:
    Value: !GetAtt MonitoringStack.Outputs.SNSTopicArn
  StopTasksExperimentId:
    Condition: CreateChaos
    Value: !GetAtt ChaosStack.Outputs.StopTasksExperimentId
  CpuStressExperimentId:
    Condition: CreateChaos
    Value: !GetAtt ChaosStack.Outputs.CpuStressExperimentId
  WebhookBridgeFunctionName:
    Value: !GetAtt WebhookBridgeStack.Outputs.WebhookBridgeFunctionName
  InvestigatorFunctionName:
    Value: !GetAtt InvestigatorStack.Outputs.InvestigatorFunctionName
  InvestigatorActionsApiUrl:
    Description: Paste this URL into Slack app -> Interactivity & Shortcuts -> Request URL.
    Value: !GetAtt InvestigatorInteractionsStack.Outputs.ActionsApiUrl
  InvestigatorActionsFunctionName:
    Value: !GetAtt InvestigatorInteractionsStack.Outputs.ActionsFunctionName
  IncidentMemoryTableName:
    Value: !GetAtt InvestigatorStack.Outputs.IncidentMemoryTableName
  ChaosTriggerFunctionName:
    Value: !GetAtt ChaosTriggerStack.Outputs.ChaosTriggerFunctionName
  ChaosTriggerConsoleUrl:
    Description: Click this to open the Lambda console testing tab for the chaos trigger.
    Value: !GetAtt ChaosTriggerStack.Outputs.ChaosTriggerConsoleUrl
  DashboardName:
    Value: !GetAtt MonitoringStack.Outputs.DashboardName
